<html>
<head>
    <title>Dashboard</title>
    <script src="{{ url_for('static', filename='on_exit.js') }}" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-container {
            background: #fff;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .email {
            font-weight: bold;
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            margin: 12px 0;
            padding: 12px 0;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .logout-form {
            margin-top: 25px;
        }

        .logout-form button {
            background-color: #dc3545;
            width: 100%;
            padding: 12px 0;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-form button:hover {
            background-color: #b52d3b;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #777;
            font-size: 13px;
        }
		
		a, a:focus, a:active {
			text-decoration: none;
			outline: none;
		}		
		
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>Welcome!</h1>
        <div class="email">{{ email }}</div>

        <a href="/exam_data"><button class="btn">View Exam Data</button></a>
        <a href="/asset_data"><button class="btn">View Asset Data</button></a>
        <a href="/route_data"><button class="btn">View Route Data</button></a>
        <a href="/user_data"><button class="btn">View User Data</button></a>

        <form action="/logout" method="GET" class="logout-form">
            <button type="submit" class="confirm-logout">Logout</button>
        </form>
    </div>

    <footer>
        © {{ current_year or "2025" }} JBA Consulting – Admin Panel
    </footer>
</body>
</html>
