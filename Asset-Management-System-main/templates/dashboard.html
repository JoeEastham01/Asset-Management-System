<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="{{ url_for('static', filename='on_exit.js') }}" defer></script>
</head>
<body class="dashboard-body"> 
    <div class="top-navbar">
        <h1>Welcome, {{ name }}!</h1>
        
        <div class="horizontal-tabs">
            <a href="/exam_data"><button class="btn-menu">View Exam Data</button></a>
            <a href="/asset_data"><button class="btn-menu">View Asset Data</button></a>
            <a href="/route_data"><button class="btn-menu">View Route Data</button></a>
            <a href="/user_data"><button class="btn-menu">View User Data</button></a>
            
            <form action="/logout" method="GET" class="logout-form-inline">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </div>

    <div id="map"></div>

  <script>
      // 1. Initialize map engine
      const map = L.map('map').setView([0, 0], 2);

      // 2. Define the Base Layer (OpenStreetMap)
      const openStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap contributors'
      }).addTo(map); // Added by default

      // 3. Define Styles and Trackers
      const defaultStyle = { color: "#1a365d", weight: 6, opacity: 0.8 };
      const highlightStyle = { color: "#ff3333", weight: 10, opacity: 1.0 };            
      let currentlySelectedLayer = null;

      // 4. Create empty GeoJSON layer group
      const myLayer = L.geoJSON(null, {
          style: defaultStyle,
          onEachFeature: function (feature, layer) {
              
              layer.on('click', function (e) {
                  L.DomEvent.stopPropagation(e);

                  if (currentlySelectedLayer === layer) {
                      myLayer.resetStyle(layer);
                      layer.closePopup();
                      currentlySelectedLayer = null;
                      return;
                  }

                  if (currentlySelectedLayer) {
                      myLayer.resetStyle(currentlySelectedLayer);
                  }

                  layer.setStyle(highlightStyle);
                  currentlySelectedLayer = layer;

                  // 1. Read fields from your QGIS properties safely (checking lower and upper case)
                  const props = feature.properties || {};
                  const Bid = props.bid || props.BID || "Unknown ID";
                  const trackDesc = props.description || props.DESCRIPTION || "No description available";
                  const routeType = props.route_type || props.ROUTE_TYPE || "Unknown";
                  const speedBand = props.speedband || props.SPEEDBAND || "Unknown";

                  // Grab your spatial unique index key (check lower/uppercase based on your QGIS output name)
                  const ogrFid = feature.id || props.ogr_fid || props.OGR_FID || "";

                  // 2. Append &ogr_fid= to your tracking link
                  const popupContent = `
                      <div style="text-align: center;">
                          <p style="margin: 0 0 8px;">Track Selection Active</p>
                          <a href="/track_section_record?bid=${encodeURIComponent(Bid)}&description=${encodeURIComponent(trackDesc)}&route_type=${encodeURIComponent(routeType)}&speedband=${encodeURIComponent(speedBand)}&ogr_fid=${encodeURIComponent(ogrFid)}">
                              <button class="btn-menu">${Bid}</button>
                          </a>
                      </div>
                  `;
                  layer.bindPopup(popupContent).openPopup();
              });
          }
      }).addTo(map); // Added by default

      // 5. SET UP TOGGLE PANEL (Both are now checkbox overlays)
      const baseMaps = {}; 

      const overlayMaps = {
          "OpenStreetMap": openStreetMap,
          "Track Sections": myLayer
      };

      L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

      // 6. Fetch GeoJSON
      const geojsonUrl = "{{ url_for('static', filename='data/north_east_small.geojson') }}";

      fetch(geojsonUrl)
          .then(response => response.json())
          .then(geojsonData => {
              myLayer.addData(geojsonData);
              map.fitBounds(myLayer.getBounds());
          })
          .catch(error => console.error('Error loading the GeoJSON file:', error));

      // 7. Reset selection on empty map background click
      map.on('click', function() {
          if (currentlySelectedLayer) {
              myLayer.resetStyle(currentlySelectedLayer);
              currentlySelectedLayer.closePopup();
              currentlySelectedLayer = null;
          }
      });
  </script>   

</body>
</html>
