<html>
<head>
    <title>Welcome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-container {
            background: #fff;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        a {
            text-decoration: none;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #777;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Rail Asset Management System</h1>
        <a href="/login"><button class="btn">Login</button></a>
        <a href="/register"><button class="btn">Register</button></a>
    </div>

    <footer>
        © {{ current_year or "2025" }} JBA Consulting – All Rights Reserved
    </footer>
</body>
</html>
